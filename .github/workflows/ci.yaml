# .github/workflows/ci.yml
#
# CI Workflow – Build · Test · Analyze
#
# Runs on every push and pull-request.
# Test results are uploaded to Codecov.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Build · Test · Analyze
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Dart SDK ──────────────────────────────────────────────────────────
      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: dart pub get

      # ── Static analysis ───────────────────────────────────────────────────
      - name: Analyze code (dart analyze)
        run: dart analyze --fatal-infos

      # ── Formatting ────────────────────────────────────────────────────────
      - name: Check formatting (dart format)
        run: dart format --output=none --set-exit-if-changed .

      # ── Tests with coverage ───────────────────────────────────────────────
      - name: Run tests with coverage
        run: dart test --coverage=coverage

      # ── Convert to lcov ───────────────────────────────────────────────────
      - name: Convert coverage to lcov
        run: dart pub run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

      # ── Upload to Codecov ─────────────────────────────────────────────────
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
