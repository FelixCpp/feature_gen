name: Main CI

# Runs on every push to main (i.e. after a merge from develop) and on pull
# requests targeting main.  Executes all CI checks, previews the next
# CHANGELOG entry via git-cliff, and runs a publish dry-run so issues are
# caught before an actual release.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify_and_preview:
    name: Verify & Preview Release
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Preview CHANGELOG for next release
        run: |
          echo "### Unreleased changes that would appear in the next CHANGELOG ###"
          git-cliff --unreleased

      - name: Publish dry-run
        run: dart pub publish --dry-run
