name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3 — without leading v)"
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────
  # 1. Eingabe validieren & gegen pubspec prüfen
  # ─────────────────────────────────────────────
  verify:
    name: Verify version & pubspec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate version format (X.Y.Z)
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ '$VERSION' ist kein gültiges Format — erwartet: X.Y.Z (z.B. 1.2.3)"
            exit 1
          fi
          echo "✅ Format OK: $VERSION"

      - name: Check pubspec.yaml version matches input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          if [[ "$VERSION" != "$PUBSPEC_VERSION" ]]; then
            echo "❌ Eingabe '$VERSION' ≠ pubspec.yaml '$PUBSPEC_VERSION'"
            echo "   Bitte zuerst pubspec.yaml anpassen und committen."
            exit 1
          fi
          echo "✅ Versionen stimmen überein: $VERSION"

  # ─────────────────────────────────────────────
  # 2. Changelog generieren, committen & pushen,
  #    Tag auf neuen Commit setzen, Release anlegen
  # ─────────────────────────────────────────────
  release:
    name: Create changelog, tag & GitHub Release
    needs: verify
    runs-on: ubuntu-latest

    permissions:
      contents: write # Nötig für Commit, Push, Tag und Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff braucht die vollständige Commit-History
          # Wichtig: Mit dem Standard-GITHUB_TOKEN kann ein Push aus einem
          # Workflow keinen neuen Workflow-Run auf dem Branch triggern.
          # Falls du das brauchst, ersetze dies durch einen PAT:
          # token: ${{ secrets.PAT }}

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag "v${{ github.event.inputs.version }}" --prepend CHANGELOG.md
          # --unreleased  → alle Commits seit dem letzten Tag
          # --tag         → git-cliff kennt den neuen Tag-Namen bereits für den Header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit & push CHANGELOG.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog for v${{ github.event.inputs.version }} [skip ci]"
          git push origin HEAD
          # [skip ci] verhindert dass der CI-Workflow durch diesen Commit getriggert wird

      - name: Create and push tag (auf dem neuen Commit)
        run: |
          VERSION="v${{ github.event.inputs.version }}"
          git tag "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Generate release notes (nur dieser Release, kein Header)
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
          # --latest      → nur Commits dieses Releases
          # --strip header → kein Titel im Release-Body
        env:
          OUTPUT: /tmp/release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          body_path: /tmp/release-notes.md

  # ─────────────────────────────────────────────
  # 3. Auf pub.dev veröffentlichen
  # ─────────────────────────────────────────────
  publish:
    name: Publish to pub.dev
    needs: release
    runs-on: ubuntu-latest

    # Notwendig für OIDC-basierte pub.dev-Authentifizierung
    # (kein manuelles Token nötig – empfohlener Weg seit 2023)
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Dry-run publish (Validierung)
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish --force
        # --force überspringt die interaktive Bestätigung in CI
        # Die OIDC-Authentifizierung läuft automatisch über die
        # "permissions: id-token: write" Permission oben
