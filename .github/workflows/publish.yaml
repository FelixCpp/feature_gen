name: Publish

on:
  push:
    tags:
      - "v*" # Wird durch release.yml getriggert wenn der Tag gepusht wird

jobs:
  # ─────────────────────────────────────────────
  # Auf pub.dev veröffentlichen
  # ─────────────────────────────────────────────
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest

    # Notwendig für OIDC-basierte pub.dev-Authentifizierung
    # (kein manuelles Token nötig – empfohlener Weg seit 2023)
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          # Checkout des Tags, damit der aktuelle CHANGELOG.md enthalten ist

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Dry-run publish (Validierung)
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish --force
        # --force überspringt die interaktive Bestätigung in CI
        # Die OIDC-Authentifizierung läuft automatisch über die
        # "permissions: id-token: write" Permission oben
