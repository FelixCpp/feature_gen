name: Publish to pub.dev

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (kein echtes Publishing)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Manuell gestartet → validieren, CHANGELOG, Tag pushen
  # Pusht den Tag via PAT → GitHub erlaubt dadurch den Workflow-Trigger
  # ─────────────────────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT statt GITHUB_TOKEN → Tag-Push triggert den publish-Job
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check tag does not exist yet
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "❌ Tag $TAG existiert bereits! Bitte Version in pubspec.yaml erhöhen."
            exit 1
          fi

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

      - name: Publish dry run
        if: ${{ inputs.dry_run }}
        run: dart pub publish --dry-run

      - name: Install git-cliff
        if: ${{ !inputs.dry_run }}
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Update CHANGELOG.md (if needed)
        if: ${{ !inputs.dry_run }}
        run: |
          git-cliff --tag ${{ steps.version.outputs.tag }} -o CHANGELOG.md
          if git diff --quiet CHANGELOG.md; then
            echo "✅ CHANGELOG.md ist bereits aktuell, nichts zu tun."
          else
            echo "📝 CHANGELOG.md wurde aktualisiert, committe Änderungen..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "chore: update CHANGELOG.md for ${{ steps.version.outputs.tag }}"
            git push
          fi

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          # PAT sorgt dafür dass GitHub diesen Push als externen Trigger wertet
          # → der publish-Job unten wird dadurch ausgelöst

  # ─────────────────────────────────────────────────────────────
  # Job 2: Läuft nur wenn ein Tag gepusht wurde
  # GITHUB_REF ist dann ein Tag-Ref → pub.dev OIDC klappt
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish & Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    permissions:
      id-token: write # OIDC für pub.dev
      contents: write # GitHub Release erstellen

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Publish to pub.dev
        run: dart pub publish --force

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        id: changelog
        run: |
          NOTES=$(git-cliff --tag ${{ github.ref_name }} --unreleased --strip all)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
