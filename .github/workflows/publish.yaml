# .github/workflows/publish.yml
#
# Publish Workflow – pub.dev via OIDC
#
# ⚠️  pub.dev OIDC constraint:
#     This workflow MUST be triggered by a tag push (`push: tags:`).
#     pub.dev verifies the OIDC token's `ref_type` claim and rejects any
#     publish attempt whose token was issued for a branch trigger (push to
#     branch, workflow_dispatch, workflow_call from a branch run, etc.).
#     See: https://github.com/dart-lang/pub-dev/issues/7177
#          https://github.com/dart-lang/pub-dev/issues/8507
#
# Setup checklist (one-time)
# ──────────────────────────
#  1. Publish the very first version manually: `dart pub publish`
#  2. On pub.dev → package page → Admin → "Automated publishing":
#       • Enable GitHub Actions publishing
#       • Repository : <owner>/<repo>
#       • Tag pattern: v{{version}}
#       • Environment: pub.dev   ← optional but recommended
#  3. On GitHub → repo → Settings → Environments → create "pub.dev"
#     (add protection rules / required reviewers as desired)
#
# The reusable dart-lang workflow handles:
#   • dart pub get
#   • dart pub publish --force
#   • OIDC token exchange with pub.dev

name: Publish to pub.dev

on:
  push:
    tags:
      # Must match the tag-pattern configured on pub.dev.
      # Pattern on pub.dev: v{{version}}
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  publish:
    name: Publish to pub.dev (OIDC)
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev

    # Use the official reusable Dart publishing workflow.
    # This is strongly recommended by the Dart team – it allows pub.dev to
    # verify how the package was published and keeps the publish logic
    # maintained by the Dart team.
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      # Must match the environment name created in GitHub repo settings.
      # The environment name is embedded in the OIDC token and validated
      # by pub.dev, so it cannot be spoofed by a repo contributor.
      environment: pub.dev
      # Uncomment if the package is not in the repository root:
      # working-directory: path/to/package
