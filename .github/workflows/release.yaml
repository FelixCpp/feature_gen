name: Release

# pub.dev erlaubt automatisches Publizieren NUR bei Tag-Pushes.
# Ohne diesen Trigger lehnt pub.dev den Publish-Versuch ab.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      # Erforderlich für OIDC-basierte Authentifizierung gegenüber pub.dev
      id-token: write
      # Erforderlich für das Erstellen eines GitHub Releases
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # Die offizielle Action übernimmt das OIDC-Handshake mit pub.dev
      # vollständig – kein dart pub get, kein --force nötig.
      - name: Publish to pub.dev
        uses: dart-lang/pub-dev-action@v1

      # Extrahiert nur den Changelog-Abschnitt der aktuellen Version
      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git cliff --current --strip all | gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file -
