name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual publishing)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Triggered manually → validate, update CHANGELOG, push tag
  # Uses a PAT so the tag push re-triggers this workflow's publish job
  # ─────────────────────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT instead of GITHUB_TOKEN so the tag push triggers the publish job
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check tag does not exist yet
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "❌ Tag $TAG already exists! Please bump the version in pubspec.yaml."
            exit 1
          fi

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

      - name: Publish dry run
        if: ${{ inputs.dry_run }}
        run: dart pub publish --dry-run

      - name: Install git-cliff
        if: ${{ !inputs.dry_run }}
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Update CHANGELOG.md (if needed)
        if: ${{ !inputs.dry_run }}
        run: |
          git-cliff --tag ${{ steps.version.outputs.tag }} -o CHANGELOG.md
          if git diff --quiet CHANGELOG.md; then
            echo "✅ CHANGELOG.md is already up to date, nothing to do."
          else
            echo "📝 CHANGELOG.md was updated, committing changes..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "chore: update CHANGELOG.md for ${{ steps.version.outputs.tag }}"
            git push
          fi

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          # PAT ensures GitHub treats this push as an external trigger
          # so the publish job below is fired

  # ─────────────────────────────────────────────────────────────
  # Job 2: Runs only when a version tag is pushed
  # GITHUB_REF is a tag ref → pub.dev OIDC authentication succeeds
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish & Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    permissions:
      id-token: write # required for pub.dev OIDC
      contents: write # required for creating a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Publish to pub.dev
        run: dart pub publish --force

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        id: changelog
        run: |
          NOTES=$(git-cliff --tag ${{ github.ref_name }} --unreleased --strip all)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
