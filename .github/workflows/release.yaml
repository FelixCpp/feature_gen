name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (z.B. 1.2.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Run tests
        run: dart test --coverage=coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info

      # -----------------------------
      # Version prüfen & setzen
      # -----------------------------
      - name: Sync version with pubspec.yaml
        run: |
          INPUT_VERSION=${{ github.event.inputs.version }}

          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')

          echo "Current: $CURRENT_VERSION"
          echo "Input:   $INPUT_VERSION"

          if [ "$CURRENT_VERSION" != "$INPUT_VERSION" ]; then
            sed -i "s/^version: .*/version: $INPUT_VERSION/" pubspec.yaml
            echo "Version updated in pubspec.yaml"
          else
            echo "Version already correct"
          fi

      # -----------------------------
      # CHANGELOG generieren
      # -----------------------------
      - name: Install git-cliff
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz \
          | tar -xz
          sudo mv git-cliff /usr/local/bin/

      - name: Generate CHANGELOG
        run: |
          git-cliff --output CHANGELOG.md

      # -----------------------------
      # Commit falls Änderungen
      # -----------------------------
      - name: Commit changes if needed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add pubspec.yaml CHANGELOG.md

          if ! git diff --cached --quiet; then
            git commit -m "chore(release): ${{ github.event.inputs.version }}"
            git push
          else
            echo "No changes to commit"
          fi

      # -----------------------------
      # Tag erstellen
      # -----------------------------
      - name: Create tag
        run: |
          VERSION=${{ github.event.inputs.version }}
          git tag "v$VERSION"
          git push origin "v$VERSION"

      # -----------------------------
      # GitHub Release erstellen
      # -----------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      # -----------------------------
      # pub.dev publish vorbereiten
      # -----------------------------
      - name: Setup pub credentials
        run: |
          mkdir -p ~/.pub-cache
          echo '${{ secrets.PUB_CREDENTIALS }}' > ~/.pub-cache/credentials.json

      # -----------------------------
      # VALIDATION (wichtig!)
      # -----------------------------
      - name: Dart publish dry-run
        run: dart pub publish --dry-run

      # -----------------------------
      # Publish zu pub.dev
      # -----------------------------
      - name: Publish package
        run: dart pub publish -f
