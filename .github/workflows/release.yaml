name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3 – without 'v' prefix)"
        required: true
        type: string
      fix_pubspec:
        description: "Auto-update pubspec.yaml if version mismatches?"
        required: false
        default: true
        type: boolean
      dry_run:
        description: "Dry run (no push, no tag)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write # Create commits & tags

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (full history for git-cliff) ──────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      # ── 2. Tooling ────────────────────────────────────────────
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Install yq
        uses: mikefarah/yq@v4

      # ── 3. Configure Git ──────────────────────────────────────
      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 4. Validate input version & compare with pubspec ──────
      - name: Validate & reconcile version
        id: validate
        run: |
          INPUT="${{ github.event.inputs.version }}"
          VERSION="${INPUT#v}"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Input version '$VERSION' is not valid SemVer (x.y.z)."
            exit 1
          fi

          TAG="v${VERSION}"
          PUBSPEC_VERSION=$(yq '.version' pubspec.yaml)

          echo "Input version : $VERSION"
          echo "pubspec.yaml  : $PUBSPEC_VERSION"
          echo "Tag           : $TAG"

          if [ "$VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "::warning::Version mismatch – input '$VERSION' vs pubspec '$PUBSPEC_VERSION'."
            if [ "${{ github.event.inputs.fix_pubspec }}" = "true" ]; then
              echo "Auto-fixing pubspec.yaml to $VERSION ..."
              yq -i ".version = \"$VERSION\"" pubspec.yaml
            else
              echo "::error::Version mismatch and fix_pubspec=false. Aborting."
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      # ── 5. Generate CHANGELOG ─────────────────────────────────
      - name: Generate CHANGELOG
        run: |
          git-cliff \
            --config cliff.toml \
            --tag "${{ steps.validate.outputs.tag }}" \
            --output CHANGELOG.md

      # ── 6. CI checks ──────────────────────────────────────────
      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

      # ── 7. Commit & push ──────────────────────────────────────
      #    Commit BEFORE --dry-run so the working tree is clean.
      #    dart pub publish --dry-run runs `git status` internally
      #    and fails when tracked files are modified.
      #    [skip ci] prevents the CI workflow from re-triggering.
      - name: Commit release changes
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git add pubspec.yaml CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Nothing to commit – already up to date."
          else
            git commit -m "chore(release): ${{ steps.validate.outputs.version }} [skip ci]"
          fi

      - name: Create & push Git tag
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git tag "${{ steps.validate.outputs.tag }}" \
            -m "Release ${{ steps.validate.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.validate.outputs.tag }}"
          # Pushing this tag automatically triggers publish.yml via
          # `on: push: tags: ['v*.*.*']` – which receives refType: tag
          # in its OIDC token, satisfying pub.dev's publishing policy.

      # ── 8. pub.dev dry-run (tree is clean after commit) ───────
      - name: dart pub publish --dry-run
        run: dart pub publish --dry-run

      # ── 9. Dry-run summary ────────────────────────────────────
      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "## Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |"  >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ----- |"  >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.validate.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag     | \`${{ steps.validate.outputs.tag }}\` |"     >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### CHANGELOG preview (first 60 lines)" >> "$GITHUB_STEP_SUMMARY"
          head -60 CHANGELOG.md >> "$GITHUB_STEP_SUMMARY"
