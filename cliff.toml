# cliff.toml
#
# Configuration for git-cliff (https://git-cliff.org)
# Place this file in the root of your repository.
#
# git-cliff parses Conventional Commits and groups them into sections.

[changelog]
# Template used to render the changelog body (Tera syntax).
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
  {% if commit.breaking %} (**BREAKING**){% endif %} ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""

# Remove leading/trailing whitespace from the template output.
trim = true

# Path of the output file (can be overridden by --output flag).
output = "CHANGELOG.md"

[git]
# Only include conventional commits in the changelog.
conventional_commits = true

# Filter out commits that do not match the conventional commit pattern.
filter_unconventional = true

# Process each line of a commit as an individual commit message.
split_commits = false

# Regex for parsing and grouping commits.
commit_parsers = [
  { message = "^feat",     group = "<!-- 0 -->🚀 Features"       },
  { message = "^fix",      group = "<!-- 1 -->🐛 Bug Fixes"       },
  { message = "^perf",     group = "<!-- 2 -->⚡ Performance"      },
  { message = "^refactor", group = "<!-- 3 -->♻️  Refactoring"     },
  { message = "^docs",     group = "<!-- 4 -->📖 Documentation"    },
  { message = "^test",     group = "<!-- 5 -->✅ Tests"            },
  { message = "^build",    group = "<!-- 6 -->🏗️  Build System"    },
  { message = "^ci",       group = "<!-- 7 -->⚙️  CI/CD"           },
  { message = "^chore",    skip = true                            },
  { message = "^revert",   group = "<!-- 8 -->⏪ Reverts"          },
]

# Protect breaking changes from being skipped due to the filters above.
protect_breaking_commits = true

# Filter out the commits that are not matched by the commit_parsers.
filter_commits = true

# Glob pattern for matching git tags.
tag_pattern = "v[0-9]*"

# Skip tags matching this regex (e.g. release candidates, betas).
# Uncomment to exclude pre-releases from the changelog:
# skip_tags = "v.*-(alpha|beta|rc).*"

# Sort the tags topologically.
topo_order = false

# Sort the commits inside sections by their date.
sort_commits = "oldest"
