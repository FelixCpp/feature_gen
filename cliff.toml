# cliff.toml – git-cliff configuration
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
The format follows [Keep a Changelog](https://keepachangelog.com/)
and this project adheres to [Semantic Versioning](https://semver.org/).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] – {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}⚠ **BREAKING** {% endif %}\
  {{ commit.message | upper_first }} \
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))\
  {% if commit.author.name %} by @{{ commit.author.name }}{% endif %}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
# Only semver tags (v1.2.3)
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"

conventional_commits = true
filter_unconventional = false   # Keep commits without conventional prefix
split_commits = false
commit_preprocessors = []

# Map conventional commit types → changelog groups
commit_parsers = [
  { message = "^feat",              group = "Features"        },
  { message = "^fix",               group = "Bug Fixes"       },
  { message = "^perf",              group = "Performance"     },
  { message = "^refactor",          group = "Refactoring"     },
  { message = "^doc|^docs",         group = "Documentation"   },
  { message = "^test",              group = "Testing"         },
  { message = "^build|^ci|^chore",  group = "Maintenance"     },
  # Catch-all: commits that don't follow any conventional type
  { message = ".*",                 group = "Other Changes"   },
]

# Skip automated release commits to avoid noise
filter_commits = true
ignore_tags = "^v.*-rc.*"
protect_breaking_commits = false
sort_commits = "newest"

# Bump rules – what triggers which SemVer increment
[bump]
# Breaking changes (!) → major
# feat              → minor
# fix / everything else → patch
features_always_bump_minor = true
breaking_always_bump_major = true
