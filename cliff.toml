# git-cliff configuration
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.
Versions follow [Semantic Versioning](https://semver.org).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))
{%- endfor %}
{% endfor %}\n
"""
footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Commits die im Changelog erscheinen
commit_parsers = [
  { message = "^feat",     group = "Features"         },
  { message = "^fix",      group = "Bug Fixes"        },
  { message = "^perf",     group = "Performance"      },
  { message = "^refactor", group = "Refactoring"      },
  { message = "^docs",     group = "Documentation"    },
  { message = "^test",     group = "Testing"          },
  { message = "^chore\\(release\\)", skip = true      },
  { message = "^chore",    group = "Miscellaneous"    },
  { message = "^ci",       skip = true                },
  { message = "^style",    skip = true                },
  { body = ".*security",   group = "Security"         },
]

# Nur Commits mit Conventional Commit Format
filter_commits = true

# Tag-Pattern für Versionen (z.B. v1.0.0 oder 1.0.0)
tag_pattern = "v[0-9]*"

# Diese Tags ignorieren
ignore_tags = "alpha|beta|rc"

# Neueste Version zuerst
topo_order = false
sort_commits = "oldest"

[remote.github]
owner = "dein-name"
repo = "feature_gen"
