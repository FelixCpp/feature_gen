name: feature_gen
description: A generate tool for features inside your flutter app.
version: 1.0.0
publish_to: https://pub.dev
repository: https://github.com/FelixCpp/feature_gen
issue_tracker: https://github.com/<user>/<repository>/issues
topics:
  - code-generation
  - cli
  - dart

environment:
  sdk: ^3.0.0

dependencies:
  args: ^2.7.0
  file: ^7.0.1
  freezed_annotation: ^3.1.0
  mason_logger: ^0.3.3
  path: ^1.9.1
  recase: ^4.1.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.12.2
  freezed: ^3.2.5
  lints: ^6.0.0
  test: ^1.25.6
